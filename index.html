<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
  <meta name="theme-color" content="#1A1410">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tricot">
  <link rel="manifest" href="data:application/json,{
    &quot;name&quot;: &quot;Tricot&quot;,
    &quot;short_name&quot;: &quot;Tricot&quot;,
    &quot;start_url&quot;: &quot;.&quot;,
    &quot;display&quot;: &quot;standalone&quot;,
    &quot;background_color&quot;: &quot;#1A1410&quot;,
    &quot;theme_color&quot;: &quot;#D97B4F&quot;,
    &quot;icons&quot;: [{
      &quot;src&quot;: &quot;data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧶</text></svg>&quot;,
      &quot;sizes&quot;: &quot;any&quot;,
      &quot;type&quot;: &quot;image/svg+xml&quot;
    }]
  }">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistant tricot - al4skaa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent:     #D97B4F;   /* terracotta */
    --accent-2:   #C4914A;   /* ambre doré */
    --accent-3:   #8E6C4E;   /* brun doux */
    --bg:         #1A1410;   /* brun très sombre */
    --surface:    #231C16;   /* brun sombre */
    --surface-2:  #2D241C;   /* brun moyen */
    --border:     rgba(255,220,180,0.08);
    --border-warm:rgba(217,123,79,0.25);
    --text:       #F5EDE3;   /* crème */
    --muted:      #8A7B6E;   /* sable foncé */
    --done:       #4A3E34;
    --green:      #6DBF8A;
    --radius:     18px;
    --cat-skin:   #F2DFC8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 16px 70px;
    max-width: 520px;
    margin: 0 auto;
  }

  /* ── HEADER ── */
  header {
    padding: 40px 0 32px;
    text-align: center;
  }
  .logo {
    width: 62px; height: 62px;
    background: linear-gradient(145deg, #3D2B1A, #2D1F12);
    border: 1px solid var(--border-warm);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.7rem;
    margin: 0 auto 18px;
    box-shadow: 0 8px 32px rgba(217,123,79,0.18), inset 0 1px 0 rgba(255,220,180,0.08);
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem; font-weight: 400; letter-spacing: -0.5px;
    color: var(--text);
  }
  .header-accent {
    color: var(--accent);
  }
  header p {
    color: var(--muted);
    font-size: 0.86rem;
    margin-top: 7px;
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 12px;
  }
  .card-warm {
    background: linear-gradient(145deg, #261D15, #231916);
    border-color: var(--border-warm);
  }
  .section-label {
    font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::before {
    content: '';
    display: inline-block;
    width: 3px; height: 14px;
    background: linear-gradient(180deg, var(--accent), var(--accent-2));
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── INPUTS ── */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 0.76rem; font-weight: 500; color: var(--muted); }
  input[type=number] {
    padding: 13px 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 1.05rem; font-weight: 500; font-family: 'DM Sans', inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield; width: 100%;
  }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type=number]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(217,123,79,0.15);
  }
  input[type=number]::placeholder { color: var(--done); }

  /* ── TOGGLE BTNS ── */
  .toggle-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .toggle-btn {
    padding: 11px 10px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface-2);
    color: var(--muted);
    font-family: 'DM Sans', inherit;
    font-size: 0.88rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .toggle-btn:hover { border-color: rgba(255,220,180,0.2); color: var(--text); }
  .toggle-btn.active-augm {
    background: linear-gradient(135deg, rgba(217,123,79,0.18), rgba(196,145,74,0.1));
    border-color: var(--accent);
    color: #F0B07A;
  }
  .toggle-btn.active-dim {
    background: linear-gradient(135deg, rgba(142,108,78,0.25), rgba(196,145,74,0.12));
    border-color: var(--accent-2);
    color: #D4A96A;
  }

  /* ── CTA BUTTON ── */
  .btn-cta {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #1A1410;
    border: none; border-radius: 13px;
    font-family: 'DM Sans', inherit;
    font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 22px rgba(217,123,79,0.28);
    letter-spacing: 0.01em;
  }
  .btn-cta:hover { opacity: 0.88; }
  .btn-cta:active { transform: scale(0.98); }

  /* ── RANG CARD ── */
  .rang-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 12px;
  }
  .rang-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .rang-title {
    font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--accent);
    display: flex; align-items: center; gap: 8px;
  }
  .rang-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 14px;
    background: linear-gradient(180deg, var(--accent), var(--accent-2));
    border-radius: 2px;
  }
  .rang-reset-btn {
    font-size: 0.72rem; font-weight: 600;
    color: var(--muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 9px; padding: 5px 12px;
    cursor: pointer; font-family: 'DM Sans', inherit;
    transition: all 0.2s;
  }
  .rang-reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── PELOTE (remplace le chat) ── */
  .pelote-wrap {
    position: relative;
    width: 140px;
    margin: 0 auto 22px;
    display: flex; align-items: center; justify-content: center;
  }
  .pelote-circle {
    width: 140px; height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 35%, #F0C09A 0%, #D97B4F 45%, #A85A2E 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    box-shadow:
      0 6px 28px rgba(217,123,79,0.35),
      inset -8px -8px 20px rgba(100,40,10,0.35),
      inset 6px 6px 14px rgba(255,200,150,0.2);
    position: relative;
    overflow: hidden;
  }
  /* Fils de laine stylisés */
  .pelote-circle::before,
  .pelote-circle::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(255,220,170,0.25);
    pointer-events: none;
  }
  .pelote-circle::before {
    width: 100px; height: 60px;
    top: 30px; left: 10px;
    transform: rotate(-30deg);
  }
  .pelote-circle::after {
    width: 80px; height: 110px;
    top: 10px; left: 30px;
    transform: rotate(20deg);
  }
  .rang-number {
    font-family: 'DM Serif Display', serif;
    font-size: 3rem; font-weight: 400;
    letter-spacing: -2px; line-height: 1;
    color: #FFF5EC;
    text-shadow: 0 2px 8px rgba(100,40,10,0.5);
    position: relative; z-index: 1;
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
  }
  .rang-number.bump { transform: scale(1.22); }
  .rang-sub {
    font-size: 0.6rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.14em;
    color: rgba(255,245,236,0.75);
    position: relative; z-index: 1;
    margin-top: 3px;
  }

  /* ── RANG CONTROLS ── */
  .rang-controls {
    display: flex; align-items: center; justify-content: center; gap: 16px;
  }
  .rang-btn {
    width: 54px; height: 54px;
    border-radius: 50%; border: none;
    font-size: 1.5rem; line-height: 1;
    cursor: pointer; font-family: inherit;
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .rang-btn-minus {
    background: var(--surface-2);
    color: var(--muted);
    border: 1px solid var(--border);
    font-size: 1.6rem;
  }
  .rang-btn-minus:hover { color: var(--accent); border-color: var(--accent); }
  .rang-btn-plus {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #1A1410;
    box-shadow: 0 4px 20px rgba(217,123,79,0.38);
    font-size: 1.9rem; font-weight: 300;
  }
  .rang-btn-plus:hover { box-shadow: 0 6px 26px rgba(217,123,79,0.55); }
  .rang-btn:active { transform: scale(0.88); }

  /* ── DOTS ── */
  .rang-dots {
    display: flex; gap: 6px; justify-content: center;
    margin-top: 16px; flex-wrap: wrap;
    max-width: 260px; margin-left: auto; margin-right: auto;
  }
  .rang-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(217,123,79,0.18);
    border: 1px solid rgba(217,123,79,0.35);
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .rang-dot.filled {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-color: transparent;
    box-shadow: 0 0 5px rgba(217,123,79,0.5);
  }

  /* ── TAG BADGE ── */
  .tag {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(217,123,79,0.12);
    border: 1px solid rgba(217,123,79,0.2);
    color: var(--accent);
    border-radius: 7px; padding: 2px 9px;
    font-size: 0.78rem; font-weight: 600;
  }

  /* ── STATS ── */
  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
  .stat-chip {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 13px; padding: 13px 10px; text-align: center;
    transition: border-color 0.2s;
  }
  .stat-chip:hover { border-color: var(--border-warm); }
  .stat-val {
    font-family: 'DM Serif Display', serif;
    font-size: 1.7rem; font-weight: 400;
    color: var(--text); letter-spacing: -0.5px;
  }
  .stat-lbl { font-size: 0.67rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-top: 3px; }

  /* ── FORMULA BLOCKS ── */
  .formula-block {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 13px 15px; margin-bottom: 8px;
    border-left: 3px solid var(--accent);
  }
  .formula-block.amber { border-left-color: var(--accent-2); }
  .formula-block .flabel {
    font-size: 0.66rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--accent); margin-bottom: 6px;
  }
  .formula-block.amber .flabel { color: var(--accent-2); }
  .formula-block .fval { font-size: 0.87rem; color: var(--text); line-height: 1.65; }

  /* ── PROGRESS ── */
  .progress-wrap { margin-bottom: 16px; }
  .progress-meta {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
  }
  .progress-meta span { font-size: 0.79rem; font-weight: 500; color: var(--muted); }
  .bar-bg { height: 6px; background: var(--surface-2); border-radius: 10px; overflow: hidden; }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 10px;
    transition: width 0.45s cubic-bezier(0.34,1.56,0.64,1);
  }

  /* ── STEPS ── */
  .steps-list { display: flex; flex-direction: column; gap: 7px; }
  .step {
    display: grid; grid-template-columns: 38px 1fr auto;
    align-items: center; gap: 12px;
    padding: 13px 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 13px; cursor: pointer;
    transition: border-color 0.2s, background 0.2s, opacity 0.2s;
    user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .step:hover { border-color: rgba(217,123,79,0.3); }
  .step.active-next {
    border-color: var(--accent);
    background: rgba(217,123,79,0.07);
    box-shadow: 0 0 0 1px rgba(217,123,79,0.2);
  }
  .step.done { opacity: 0.36; border-color: var(--border); background: var(--surface-2); }
  .step-badge {
    width: 36px; height: 36px; border-radius: 11px;
    background: rgba(217,123,79,0.12);
    border: 1px solid rgba(217,123,79,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem; font-weight: 800; color: var(--accent);
    transition: all 0.2s; flex-shrink: 0;
  }
  .step.done .step-badge { background: var(--surface); border-color: var(--border); color: var(--done); }
  .step.active-next .step-badge {
    background: var(--accent); border-color: var(--accent);
    color: #1A1410;
    box-shadow: 0 2px 10px rgba(217,123,79,0.4);
  }
  .step-body { min-width: 0; }
  .step-main { font-size: 0.93rem; font-weight: 600; color: var(--text); transition: all 0.2s; }
  .step.done .step-main { text-decoration: line-through; color: var(--done); }
  .step-hint { font-size: 0.71rem; color: var(--muted); margin-top: 2px; }
  .step.done .step-hint { color: var(--done); }
  .step-icon { font-size: 1rem; opacity: 0; transition: opacity 0.2s; flex-shrink: 0; }
  .step.done .step-icon { opacity: 1; }

  /* ── COMPLETE CARD ── */
  .complete-card {
    background: linear-gradient(135deg, rgba(109,191,138,0.1), rgba(60,150,90,0.06));
    border: 1px solid rgba(109,191,138,0.22);
    border-radius: 14px; padding: 22px; text-align: center; margin-top: 12px;
  }
  .complete-card .big { font-size: 2.4rem; }
  .complete-card p { font-size: 1rem; font-weight: 700; color: var(--green); margin-top: 8px; font-family: 'DM Serif Display', serif; }
  .complete-card small { font-size: 0.8rem; color: var(--muted); display: block; margin-top: 4px; }

  /* ── RESET BTN ── */
  .btn-reset {
    width: 100%; padding: 12px; margin-top: 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px; color: var(--muted);
    font-family: 'DM Sans', inherit;
    font-size: 0.84rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0 14px;
  }

  .hidden { display: none !important; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }
  #results { animation: fadeUp 0.35s ease both; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="logo">🧶</div>
  <h1>Tricot <span class="header-accent">·</span> al4skaa</h1>
  <p>Compteur de rangs &amp; répartition des mailles</p>
</header>

<!-- ── Compteur de rangs ── -->
<div class="rang-card card-warm">
  <div class="rang-header">
    <div class="rang-title">🪡 Compteur de rangs</div>
    <button class="rang-reset-btn" onclick="resetRang()">↺ Réinitialiser</button>
  </div>

  <div class="pelote-wrap">
    <div class="pelote-circle">
      <div class="rang-number" id="rang-num">0</div>
      <div class="rang-sub">rang</div>
    </div>
  </div>

  <div class="rang-controls">
    <button class="rang-btn rang-btn-minus" onclick="changeRang(-1)">−</button>
    <button class="rang-btn rang-btn-plus" onclick="changeRang(1)">+</button>
  </div>
  <div class="rang-dots" id="rang-dots"></div>
</div>

<!-- ── Répartition ── -->
<div class="card card-warm">
  <div class="section-label">Répartition augm. &amp; dim.</div>
  <div class="form-row">
    <div class="form-group">
      <label>Mailles de départ</label>
      <input type="number" id="stitches" placeholder="ex. 10" min="1" inputmode="numeric">
    </div>
    <div class="form-group">
      <label>Nbre de modifications</label>
      <input type="number" id="increases" placeholder="ex. 5" min="1" inputmode="numeric">
    </div>
  </div>
  <div class="toggle-row">
    <button class="toggle-btn active-augm" id="btn-augm" onclick="setType('augm.',this,'augm')">⬆ Augmentation</button>
    <button class="toggle-btn" id="btn-dim" onclick="setType('dim.',this,'dim')">⬇ Diminution</button>
  </div>
  <button class="btn-cta" onclick="calculate()">Calculer la répartition</button>
  <button class="btn-reset" onclick="resetRepartition()" style="margin-top:8px">↺ Réinitialiser</button>
</div>

<!-- ── Résultats ── -->
<div id="results" class="hidden">
  <div class="card card-warm">
    <div class="section-label">Résumé du rang</div>
    <div class="stats-row">
      <div class="stat-chip">
        <div class="stat-val" id="info-n">—</div>
        <div class="stat-lbl">Mailles</div>
      </div>
      <div class="stat-chip">
        <div class="stat-val" id="info-k">—</div>
        <div class="stat-lbl" id="info-k-lbl">Augm.</div>
      </div>
      <div class="stat-chip">
        <div class="stat-val" id="info-f">—</div>
        <div class="stat-lbl">Après rang</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="formula-block">
      <div class="flabel">Formule compacte</div>
      <div class="fval" id="compact"></div>
    </div>
    <div class="formula-block amber">
      <div class="flabel">Séquence complète</div>
      <div class="fval" id="sequence"></div>
    </div>
  </div>

  <div class="card card-warm">
    <div class="section-label">Étapes — appuyez pour cocher</div>
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>Progression</span>
        <span><strong id="prog-done">0</strong> / <strong id="prog-total">0</strong></span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="bar" style="width:0%"></div></div>
    </div>
    <div class="steps-list" id="steps-list"></div>
    <div id="complete-msg" class="complete-card hidden">
      <div class="big">🎉</div>
      <p>Rang terminé !</p>
      <small>Toutes les étapes sont cochées</small>
    </div>
    <button class="btn-reset" onclick="resetSteps()">↺ Recommencer le rang</button>
  </div>
</div>

<script>
  let selectedType = 'augm.', selectedClass = 'augm';
  let totalSteps = 0, doneSteps = 0;
  let rangCount = 0;
  let lastSteps = [], lastType = 'augm.';
  const MAX_DOTS = 20;
  const STORE = 'tricot_v1';

  function save() {
    const checkedIndexes = [...document.querySelectorAll('.step.done')].map(e => parseInt(e.dataset.i));
    const data = {
      rangCount,
      stitches: document.getElementById('stitches').value,
      increases: document.getElementById('increases').value,
      type: selectedType,
      steps: lastSteps,
      checked: checkedIndexes
    };
    localStorage.setItem(STORE, JSON.stringify(data));
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORE);
      if (!raw) return;
      const data = JSON.parse(raw);
      if (data.rangCount !== undefined) { rangCount = data.rangCount; updateRangDisplay(false); }
      if (data.stitches) document.getElementById('stitches').value = data.stitches;
      if (data.increases) document.getElementById('increases').value = data.increases;
      if (data.type) {
        selectedType = data.type; selectedClass = data.type === 'augm.' ? 'augm' : 'dim';
        document.querySelectorAll('.toggle-btn').forEach(b => b.className = 'toggle-btn');
        const btn = data.type === 'augm.' ? document.getElementById('btn-augm') : document.getElementById('btn-dim');
        btn.classList.add('active-' + selectedClass);
      }
      if (data.steps && data.steps.length > 0) {
        lastSteps = data.steps; lastType = data.type || 'augm.';
        renderResults(data.steps, data.type || 'augm.',
          parseInt(data.stitches) || 0,
          parseInt(data.increases) || 0,
          data.checked || []);
      }
    } catch(e) { console.warn('Erreur de chargement:', e); }
  }

  function changeRang(delta) {
    rangCount = Math.max(0, rangCount + delta);
    updateRangDisplay(delta > 0);
    save();
  }
  function resetRang() { rangCount = 0; updateRangDisplay(false); save(); }
  function updateRangDisplay(bump) {
    const el = document.getElementById('rang-num');
    el.textContent = rangCount;
    if (bump) { el.classList.add('bump'); setTimeout(() => el.classList.remove('bump'), 200); }
    renderDots();
    document.querySelector('.rang-sub').textContent = rangCount === 1 ? 'rang' : 'rangs';
  }
  function renderDots() {
    const container = document.getElementById('rang-dots');
    container.innerHTML = '';
    const shown = Math.min(rangCount, MAX_DOTS);
    for (let i = 0; i < shown; i++) {
      const d = document.createElement('div');
      d.className = 'rang-dot filled';
      container.appendChild(d);
    }
    if (rangCount > MAX_DOTS) {
      const more = document.createElement('span');
      more.style.cssText = 'font-size:0.7rem;color:var(--accent);align-self:center;margin-left:2px;';
      more.textContent = '+' + (rangCount - MAX_DOTS);
      container.appendChild(more);
    }
  }

  function setType(type, btn, cls) {
    selectedType = type; selectedClass = cls;
    document.querySelectorAll('.toggle-btn').forEach(b => b.className = 'toggle-btn');
    btn.classList.add('active-' + cls);
    save();
  }

  function calculate() {
    const N = parseInt(document.getElementById('stitches').value);
    const K = parseInt(document.getElementById('increases').value);
    if (!N || !K || isNaN(N) || isNaN(K) || N < 1 || K < 1) { shakeInput(); return; }
    if (K > N) { alert('Le nombre de modifications ne peut pas dépasser le nombre de mailles.'); return; }
    const steps = distributeSteps(N, K);
    lastSteps = steps; lastType = selectedType;
    renderResults(steps, selectedType, N, K, []);
    save();
  }

  function distributeSteps(N, K) {
    const q = Math.floor(N/K), r = N%K;
    const steps = []; let err = Math.floor(K/2);
    for (let i=0;i<K;i++) { err+=r; if(err>=K){steps.push(q+1);err-=K;}else{steps.push(q);} }
    return steps;
  }

  function renderResults(steps, type, N, K, checkedIndexes) {
    if (N && K) {
      document.getElementById('info-n').textContent = N;
      document.getElementById('info-k').textContent = K;
      document.getElementById('info-k-lbl').textContent = type==='augm.'?'Augm.':'Dim.';
      document.getElementById('info-f').textContent = type==='augm.'?N+K:N-K;
      document.getElementById('compact').textContent = getCompact(steps, type);
      document.getElementById('sequence').textContent = steps.map(s=>s+' m. → 1 '+type).join('  ·  ');
    }
    const list = document.getElementById('steps-list');
    list.innerHTML = '';
    totalSteps = steps.length; doneSteps = 0;
    let cursor = 1;
    steps.forEach((s,i) => {
      const start=cursor, end=cursor+s-1; cursor+=s;
      const el = document.createElement('div');
      const isDone = checkedIndexes.includes(i);
      if (isDone) doneSteps++;
      el.className = 'step' + (isDone ? ' done' : '');
      el.dataset.i = i;
      el.innerHTML =
        '<div class="step-badge">'+(i+1)+'</div>'+
        '<div class="step-body">'+
          '<div class="step-main">'+s+' m. → 1 '+type+'</div>'+
          '<div class="step-hint">Maille'+(s>1?'s '+start+'–'+end:' '+start)+'</div>'+
        '</div>'+
        '<div class="step-icon">✓</div>';
      el.addEventListener('click', ()=>{ toggleStep(el); save(); });
      list.appendChild(el);
    });
    highlightNext();
    updateProgress();
    document.getElementById('complete-msg').classList.add('hidden');
    const r = document.getElementById('results');
    r.classList.remove('hidden');
    if (!checkedIndexes.length) setTimeout(()=>r.scrollIntoView({behavior:'smooth',block:'start'}),80);
  }

  function getCompact(steps, type) {
    const groups=[]; let cur=steps[0],cnt=1;
    for(let i=1;i<steps.length;i++){if(steps[i]===cur)cnt++;else{groups.push({s:cur,c:cnt});cur=steps[i];cnt=1;}}
    groups.push({s:cur,c:cnt});
    return groups.map(g=>{const p=g.s+' m., 1 '+type;return g.c>1?g.c+'×('+p+')':p;}).join('  +  ');
  }

  function toggleStep(el) {
    const was = el.classList.contains('done');
    el.classList.toggle('done');
    doneSteps += was?-1:1;
    highlightNext(); updateProgress();
  }

  function highlightNext() {
    document.querySelectorAll('.step').forEach(e=>e.classList.remove('active-next'));
    const first=[...document.querySelectorAll('.step')].find(e=>!e.classList.contains('done'));
    if(first) first.classList.add('active-next');
  }

  function resetRepartition() {
    document.getElementById('stitches').value = '';
    document.getElementById('increases').value = '';
    document.getElementById('results').classList.add('hidden');
    doneSteps = 0; totalSteps = 0; lastSteps = [];
    const data = JSON.parse(localStorage.getItem(STORE) || '{}');
    data.steps = []; data.checked = []; data.stitches = ''; data.increases = '';
    localStorage.setItem(STORE, JSON.stringify(data));
  }

  function updateProgress() {
    const pct = totalSteps>0?(doneSteps/totalSteps)*100:0;
    document.getElementById('bar').style.width=pct+'%';
    document.getElementById('prog-done').textContent=doneSteps;
    document.getElementById('prog-total').textContent=totalSteps;
    document.getElementById('complete-msg').classList.toggle('hidden', doneSteps<totalSteps||totalSteps===0);
  }

  function resetSteps() {
    document.querySelectorAll('.step').forEach(e=>e.classList.remove('done'));
    doneSteps=0; highlightNext(); updateProgress(); save();
  }

  function shakeInput() {
    document.querySelectorAll('input').forEach(i=>{
      i.style.borderColor='#D97B4F';
      setTimeout(()=>i.style.borderColor='',800);
    });
  }

  document.addEventListener('keydown', e=>{ if(e.key==='Enter') calculate(); });
  window.addEventListener('load', load);
</script>
</body>
</html>
